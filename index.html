<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易班嘉年华·思维闯关</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 20px;
            max-width: 550px;
            margin: 0 auto;
        }
        .page {
            display: none;
        }
        .active {
            display: block;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 2px 10px #00000010;
            margin-bottom: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        h2 {
            font-size: 20px;
            margin:15px 0;
            color:#222;
        }
        h3{
            font-size:16px;
            margin:10px 0 5px;
        }
        input,textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 10px;
        }
        textarea{
            min-height:60px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn-danger{
            background:#e74c3c;
        }
        .btn-success{
            background:#27ae60;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .question-img {
            width: 100%;
            border-radius: 10px;
            margin: 10px 0;
        }
        .tip {
            color: #666;
            margin-top: 10px;
            font-size: 14px;
        }
        .record-item,.q-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            word-break:break-all;
        }
        .prize {
            font-size: 20px;
            font-weight: bold;
            color: #e67e22;
            text-align: center;
            margin: 15px 0;
        }
        .q-group{
            border:1px solid #eee;
            padding:15px;
            border-radius:10px;
            margin-bottom:15px;
        }
        /* 答题结果样式 */
        .ans-item{
            padding:12px;
            border-bottom:1px solid #eee;
        }
        .right{
            color:#27ae60;
            font-weight:bold;
        }
        .wrong{
            color:#e74c3c;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div id="startPage" class="page active">
    <div class="card">
        <h1>易班嘉年华·思维闯关</h1>
        <input type="text" id="userName" placeholder="请输入你的名字">
        <button onclick="checkRole()">进入</button>
        <p class="tip">每组固定3题｜第1/2/3关｜3分一等奖｜2分二等奖｜1分三等奖</p>
    </div>
</div>

<div id="adminPage" class="page">
    <div class="card">
        <h1>管理员·题库管理（3题一组）</h1>
        <div id="qForm"></div>
        <button class="btn-success" onclick="saveQuestions()">保存全部题库</button>
        <button onclick="backToStart()">返回首页</button>
    </div>
    <div class="card">
        <h2>所有答题记录</h2>
        <div id="adminRecordList"></div>
        <button class="btn-danger" onclick="clearAllRecord()">清空所有记录</button>
    </div>
</div>

<div id="gamePage" class="page">
    <div class="card">
        <h1 id="levelTitle">第1关</h1>
        <div id="questionText" class="title"></div>
        <img id="questionImg" class="question-img">
        <input type="text" id="userAnswer" placeholder="请输入你的答案">
        <button onclick="submitAnswer()">提交答案</button>
    </div>
</div>

<div id="resultPage" class="page">
    <div class="card">
        <h1>闯关完成</h1>
        <div id="resultInfo"></div>
        <div id="answerList"></div>
        <div class="prize" id="prizeText"></div>
        <button onclick="backToStart()">再来一次</button>
    </div>
</div>

<script>
    // 题库：严格 3题一组，每次随机抽取**完整一组**，固定对应1/2/3关
    const defaultGroups = [
        // 第1组
        [
            {text:"1.什么动物天天熬夜？",img:"",answer:"熊猫"},
            {text:"2.什么门永远关不上？",img:"",answer:"球门"},
            {text:"3.打破了什么不用赔？",img:"",answer:"沉默"}
        ],
        // 第2组
        [
            {text:"1.什么水永远用不完？",img:"",answer:"泪水"},
            {text:"2.什么书里毛病最多？",img:"",answer:"医学书"},
            {text:"3.什么球不能玩？",img:"",answer:"地球"}
        ],
        // 第3组
        [
            {text:"1.什么布剪不断？",img:"",answer:"瀑布"},
            {text:"2.什么瓜不能吃？",img:"",answer:"傻瓜"},
            {text:"3.偷什么不犯法？",img:"",answer:"偷笑"}
        ],
        // 第4组
        [
            {text:"1.什么池没有水？",img:"",answer:"电池"},
            {text:"2.什么路最窄？",img:"",answer:"冤家路"},
            {text:"3.什么酒不能喝？",img:"",answer:"碘酒"}
        ],
        // 第5组
        [
            {text:"1.什么蛋不能吃？",img:"",answer:"考试零蛋"},
            {text:"2.什么海不产鱼？",img:"",answer:"辞海"},
            {text:"3.什么线剪不断？",img:"",answer:"光线"}
        ],
        // 第6组
        [
            {text:"1.什么马不吃草？",img:"",answer:"海马"},
            {text:"2.什么虎不吃人？",img:"",answer:"壁虎"},
            {text:"3.什么狼不吃羊？",img:"",answer:"灰太狼"}
        ]
    ];

    let questionGroups = JSON.parse(localStorage.getItem("ybGroups")) || defaultGroups;
    let records = JSON.parse(localStorage.getItem("ybGameRecords")) || [];

    let userName = "";
    let nowGroup = []; // 当前选中的一组3题，严格1/2/3关
    let userAnswers = []; // 保存用户每一题答案
    let currentLevel = 0;
    let score = 0;

    function checkRole(){
        userName = document.getElementById("userName").value.trim();
        if(!userName){alert("请输入名字");return;}
        if(userName === "易班嘉年华"){
            showPage("adminPage");
            renderAdminForm();
            showAdminRecord();
        }else{
            startGame();
        }
    }

    function renderAdminForm(){
        const list = document.getElementById("qForm");
        list.innerHTML = "<p>每组固定3题，第1题=第1关，第2题=第2关，第3题=第3关</p>";
        questionGroups.forEach((g,gi)=>{
            g.forEach((q,i)=>{
                const div = document.createElement("div");
                div.className="q-group";
                div.innerHTML = `
                <h3>第${gi+1}组-第${i+1}关</h3>
                <input placeholder="题目文字" value="${q.text}" id="g${gi}t${i}">
                <input placeholder="图片链接(可不填)" value="${q.img}" id="g${gi}img${i}">
                <input placeholder="正确答案" value="${q.answer}" id="g${gi}ans${i}">
            `;
                list.appendChild(div);
            })
        })
    }

    function saveQuestions(){
        questionGroups.forEach((g,gi)=>{
            g.forEach((q,i)=>{
                q.text = document.getElementById(`g${gi}t${i}`).value;
                q.img = document.getElementById(`g${gi}img${i}`).value;
                q.answer = document.getElementById(`g${gi}ans${i}`).value.trim();
            })
        })
        localStorage.setItem("ybGroups",JSON.stringify(questionGroups));
        alert("题库保存成功！");
    }

    function showAdminRecord(){
        const list = document.getElementById("adminRecordList");
        list.innerHTML = "";
        if(records.length===0){list.innerHTML="<div class='q-item'>暂无记录</div>";return;}
        records.forEach(r=>{
            const item = document.createElement("div");
            item.className = "q-item";
            item.innerText = `${r.time}｜${r.name}｜${r.score}分｜${r.prize}`;
            list.appendChild(item);
        })
    }

    function clearAllRecord(){
        if(confirm("确定清空所有答题记录？")){
            records=[];
            localStorage.setItem("ybGameRecords",JSON.stringify(records));
            showAdminRecord();
        }
    }

    // 随机抽取【完整一组3题】，严格对应1/2/3关
    function startGame() {
        let groupIdx = Math.floor(Math.random() * questionGroups.length);
        nowGroup = questionGroups[groupIdx];
        userAnswers = [];
        currentLevel = 0;
        score = 0;
        showPage("gamePage");
        loadQuestion();
    }

    function loadQuestion() {
        const q = nowGroup[currentLevel];
        document.getElementById("levelTitle").innerText = `第${currentLevel + 1}关`;
        document.getElementById("questionText").innerText = q.text;
        document.getElementById("questionImg").src = q.img||"";
        document.getElementById("questionImg").style.display = q.img?"block":"none";
        document.getElementById("userAnswer").value = "";
    }

    function submitAnswer() {
        const q = nowGroup[currentLevel];
        let userAns = document.getElementById("userAnswer").value.trim();
        let rightAns = q.answer.trim();

        userAnswers.push({
            user: userAns,
            right: rightAns,
            isRight: userAns === rightAns
        });
        if(userAns === rightAns) score++;

        currentLevel++;
        if (currentLevel >= 3) { // 固定3题结束
            showResult();
        } else {
            loadQuestion();
        }
    }

    function showResult() {
        let prize = "";
        if (score === 3) prize = "🏆 一等奖";
        else if (score === 2) prize = "🥈 二等奖";
        else if (score === 1) prize = "🥉 三等奖";
        else prize = "再接再厉";

        // 显示总分+每一题正确答案
        let ansHtml = "";
        nowGroup.forEach((q,i)=>{
            const u = userAnswers[i];
            ansHtml += `
        <div class="ans-item">
            <div>第${i+1}关：${q.text}</div>
            <div>你的答案：${u.user} <span class="${u.isRight?'right':'wrong'}">${u.isRight?'✅正确':'❌错误'}</span></div>
            <div>正确答案：${u.right}</div>
        </div>
        `;
        })

        document.getElementById("resultInfo").innerHTML = `
        <p>姓名：${userName}</p>
        <p>得分：${score} 分</p>
    `;
        document.getElementById("answerList").innerHTML = ansHtml;
        document.getElementById("prizeText").innerText = prize;

        records.unshift({
            name: userName,
            score: score,
            prize: prize,
            time: new Date().toLocaleString()
        });
        localStorage.setItem("ybGameRecords", JSON.stringify(records));

        showPage("resultPage");
    }

    function showPage(id) {
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
        document.getElementById(id).classList.add("active");
    }

    function backToStart() {
        showPage("startPage");
    }
</script>
</body>
</html>
