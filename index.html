<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>易班嘉年华·思维闯关</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 15px;
            max-width: 550px;
            margin: 0 auto;
        }
        .page {
            display: none;
        }
        .active {
            display: block;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 2px 10px #00000010;
            margin-bottom: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 22px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn-danger{
            background:#e74c3c;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .tip {
            color: #666;
            margin-top: 10px;
            font-size: 14px;
        }
        .prize {
            font-size: 20px;
            font-weight: bold;
            color: #e67e22;
            text-align: center;
            margin: 15px 0;
        }
        .ans-item{
            padding:12px;
            border-bottom:1px solid #eee;
        }
        .right{
            color:#27ae60;
            font-weight:bold;
        }
        .wrong{
            color:#e74c3c;
            font-weight:bold;
        }
        .record-item{
            padding:10px;
            border-bottom:1px solid #eee;
        }
    </style>
</head>
<body>

<!-- 开始页 -->
<div id="startPage" class="page active">
    <div class="card">
        <h1>易班嘉年华·思维闯关</h1>
        <input type="text" id="userName" placeholder="请输入你的名字">
        <button onclick="checkRole()">进入</button>
        <p class="tip">第1题6选1｜第2题4选1｜第3题固定推理题｜3分一等奖｜2分二等奖｜1分三等奖</p>
    </div>
</div>

<!-- 管理员页 -->
<div id="adminPage" class="page">
    <div class="card">
        <h1>管理员后台｜答题记录</h1>
        <div id="recordList"></div>
        <button class="btn-danger" onclick="clearRecord()">清空所有记录</button>
        <button onclick="backToStart()">返回首页</button>
    </div>
</div>

<!-- 游戏页 -->
<div id="gamePage" class="page">
    <div class="card">
        <h1 id="levelTitle">第1关</h1>
        <div id="questionText" class="title"></div>
        <input type="text" id="userAnswer" placeholder="请输入你的答案">
        <button onclick="submitAnswer()">提交答案</button>
    </div>
</div>

<!-- 结果页 -->
<div id="resultPage" class="page">
    <div class="card">
        <h1>闯关完成</h1>
        <div id="resultInfo"></div>
        <div id="answerList"></div>
        <div class="prize" id="prizeText"></div>
        <button onclick="backToStart()">再来一次</button>
    </div>
</div>

<script>
// 第1题 最新6题池（包含蚊子题）
const pool1 = [
    {text:"1.什么车没有轮子？",answer:"风车"},
    {text:"2.哪种竹子不长在泥土里？",answer:"爆竹"},
    {text:"3.什么情况下5大于0，0大于2，2大于5？",answer:"石头剪刀布"},
    {text:"4.有五只鸟在树上，猎人开枪打死一只，树上还剩几只？（答案格式：X只）用阿拉伯数字",answer:"0只"},
    {text:"5.什么官没有工资俸禄，还要自己花钱？",answer:"新郎官"},
    {text:"6.什么动物你打死了它，却流了你的血？",answer:"蚊子"}
];

// 第2题 4题池
const pool2 = [
    {text:"1.去掉前面是十三，去掉后面是四十，这个两位数是多少？用汉语数字答",answer:"四十三"},
    {text:"2.把大象装进冰箱分三步，把长颈鹿装进冰箱需要几步？（答案格式：X步）用汉语数字答",answer:"四步"},
    {text:"3.井深10米，蜗牛白天爬3米夜晚滑2米，几天能爬出井口？（答案格式：X天）用阿拉伯数字",answer:"8天"},
    {text:"4.三人三天用三桶水，九人九天用几桶水？（答案格式：X桶）用阿拉伯数字",answer:"27桶"}
];

// 第3题 固定题
const fixedQ3 = {
    text:"富豪拿出10个箱子，其中只有1个箱子装着百亿遗嘱，这10个箱子由颜色和数字组成，富豪把遗嘱箱子的颜色悄悄告诉了大儿子，把数字悄悄告诉了小女儿，然后定下规矩，谁能第一个猜出遗嘱在哪个箱子里，就能继承百亿家产，接下来豪门争斗开始，大儿子冷冷说道我不知道在哪儿，但我可以确定妹妹你也不知道，小女儿眼睛一亮，我刚才确实不知道但多亏了哥哥这句话我现在知道了，大儿子突然笑了，既然你这么说我也知道了，请问遗嘱到底在哪个箱子里？（箱子为:红2，红3，红6，蓝4，蓝5，黑1，黑3，白1，白2，白4）",
    answer:"黑3"
};

// 读取答题记录
let records = JSON.parse(localStorage.getItem("gameRecords")) || [];

let userName = "";
let nowQuestions = [];
let userAnswers = [];
let currentLevel = 0;
let score = 0;

// 判断身份：输入“易班嘉年华”进管理员
function checkRole(){
    userName = document.getElementById("userName").value.trim();
    if(!userName){alert("请输入名字");return;}
    if(userName === "易班嘉年华"){
        showPage("adminPage");
        showAdminRecord();
    }else{
        startGame();
    }
}

// 显示管理员记录
function showAdminRecord(){
    const list = document.getElementById("recordList");
    list.innerHTML = "";
    if(records.length===0){
        list.innerHTML = "<div class='record-item'>暂无答题记录</div>";
        return;
    }
    records.forEach(r=>{
        list.innerHTML += `
        <div class="record-item">
            ${r.time}｜${r.name}｜${r.score}分｜${r.prize}
        </div>
        `;
    })
}

// 清空记录
function clearRecord(){
    if(confirm("确定清空所有答题记录？")){
        records = [];
        localStorage.setItem("gameRecords",JSON.stringify(records));
        showAdminRecord();
    }
}

// 开始游戏
function startGame() {
    let q1 = pool1[Math.floor(Math.random()*pool1.length)];
    let q2 = pool2[Math.floor(Math.random()*pool2.length)];
    let q3 = fixedQ3;
    nowQuestions = [q1,q2,q3];
    userAnswers = [];
    currentLevel = 0;
    score = 0;
    showPage("gamePage");
    loadQuestion();
}

// 加载题目
function loadQuestion() {
    const q = nowQuestions[currentLevel];
    document.getElementById("levelTitle").innerText = `第${currentLevel + 1}关`;
    document.getElementById("questionText").innerText = q.text;
    document.getElementById("userAnswer").value = "";
}

// 提交答案
function submitAnswer() {
    const q = nowQuestions[currentLevel];
    let userAns = document.getElementById("userAnswer").value.trim();
    let rightAns = q.answer.trim();
    
    userAnswers.push({
        user: userAns,
        right: rightAns,
        isRight: userAns === rightAns
    });
    if(userAns === rightAns) score++;

    currentLevel++;
    if (currentLevel >= 3) {
        showResult();
    } else {
        loadQuestion();
    }
}

// 结算结果
function showResult() {
    let prize = "";
    if (score === 3) prize = "🏆 一等奖";
    else if (score === 2) prize = "🥈 二等奖";
    else if (score === 1) prize = "🥉 三等奖";
    else prize = "再接再厉";

    // 保存记录
    records.unshift({
        name: userName,
        score: score,
        prize: prize,
        time: new Date().toLocaleString()
    });
    localStorage.setItem("gameRecords",JSON.stringify(records));

    // 展示结果+正确答案
    let ansHtml = "";
    nowQuestions.forEach((q,i)=>{
        const u = userAnswers[i];
        ansHtml += `
        <div class="ans-item">
            <div>第${i+1}关：${q.text}</div>
            <div>你的答案：${u.user} <span class="${u.isRight?'right':'wrong'}">${u.isRight?'✅正确':'❌错误'}</span></div>
            <div>正确答案：${u.right}</div>
        </div>
        `;
    })

    document.getElementById("resultInfo").innerHTML = `
        <p>姓名：${userName}</p>
        <p>得分：${score} 分</p>
    `;
    document.getElementById("answerList").innerHTML = ansHtml;
    document.getElementById("prizeText").innerText = prize;
    showPage("resultPage");
}

// 切换页面
function showPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// 返回首页
function backToStart() {
    showPage("startPage");
}
</script>
</body>
</html>
